name: PR Automation Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npx prettier --check .

      - name: Post code quality results
        uses: actions/github-script@v7
        id: code-quality-comment
        with:
          script: |
            const { exec } = require('@actions/exec');
            const fs = require('fs');

            // Get ESLint results
            let lintOutput = '';
            await exec('npm run lint', [], {
              listeners: {
                stdout: (data) => {
                  lintOutput += data.toString();
                },
                stderr: (data) => {
                  lintOutput += data.toString();
                }
              }
            });

            // Get Prettier results
            let prettierOutput = '';
            await exec('npx prettier --check .', [], {
              listeners: {
                stdout: (data) => {
                  prettierOutput += data.toString();
                },
                stderr: (data) => {
                  prettierOutput += data.toString();
                }
              }
            });

            // Create comment body
            const commentBody = `
            ## Code Quality Report
            
            ### ESLint Results
            \`\`\`
            ${lintOutput}
            \`\`\`
            
            ### Prettier Results
            \`\`\`
            ${prettierOutput}
            \`\`\`
            `;

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run test suite with coverage
        run: npm test -- --coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: coverage/
          retention-days: 7

      - name: Post test coverage summary
        uses: actions/github-script@v7
        id: test-coverage-comment
        with:
          script: |
            const fs = require('fs');

            // Read coverage summary
            let coverageSummary;
            try {
              coverageSummary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            } catch (error) {
              coverageSummary = {
                total: {
                  statements: { pct: 'N/A' },
                  branches: { pct: 'N/A' },
                  functions: { pct: 'N/A' },
                  lines: { pct: 'N/A' }
                }
              };
            }

            // Create comment body
            const commentBody = `
            ## Test Coverage Report
            
            | File | % Stmts | % Branch | % Funcs | % Lines |
            |------|---------|----------|---------|---------|
            | All files | ${coverageSummary.total.statements.pct} | ${coverageSummary.total.branches.pct} | ${coverageSummary.total.functions.pct} | ${coverageSummary.total.lines.pct} |
            `;

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --json > audit.json || true

      - name: Run secrets scan
        uses: actions/security-code-scan/security-code-scan@v1
        id: secrets-scan
        with:
          target: '.'
          output: 'sarif'

      - name: Post security scan results
        uses: actions/github-script@v7
        id: security-comment
        with:
          script: |
            const fs = require('fs');

            // Read npm audit results
            let auditResults = { vulnerabilities: [] };
            try {
              auditResults = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
            } catch (error) {
              console.log('Error reading audit.json:', error);
            }
            const vulnerabilities = auditResults.vulnerabilities || [];

            // Get secrets scan results
            const secretsScanResults = steps['secrets-scan'].outputs.sarif;

            // Calculate vulnerability counts
            const criticalCount = vulnerabilities.filter(v => v.severity === 'critical').length;
            const highCount = vulnerabilities.filter(v => v.severity === 'high').length;
            const moderateCount = vulnerabilities.filter(v => v.severity === 'moderate').length;
            const lowCount = vulnerabilities.filter(v => v.severity === 'low').length;

            // Create comment body
            const commentBody = `
            ## Security Scan Report
            
            ### Dependencies Vulnerabilities
            Total vulnerabilities: ${vulnerabilities.length}
            
            | Severity | Count |
            |----------|-------|
            | Critical | ${criticalCount} |
            | High | ${highCount} |
            | Moderate | ${moderateCount} |
            | Low | ${lowCount} |
            
            ${vulnerabilities.length > 0 ? 'For detailed vulnerability information, check the npm audit logs.' : 'No vulnerabilities found.'}
            
            ### Secrets Scan Results
            ${secretsScanResults ? 'Secrets scan completed. Check the security tab for detailed results.' : 'Secrets scan not available.'}
            `;

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Validate endpoints
        run: |
          # Start the application in the background
          npm start &
          APP_PID=$!
          
          # Wait for the application to start
          sleep 10
          
          # Check if the application is running
          if ps -p $APP_PID > /dev/null; then
            echo "Application started successfully"
            
            # Validate endpoints (adjust URLs and ports as needed)
            echo "Validating endpoints..."
            curl -I http://localhost:3000/ || echo "Root endpoint failed"
            curl -I http://localhost:3000/api/health || echo "Health endpoint failed"
            
            # Stop the application
            kill $APP_PID
          else
            echo "Application failed to start"
            exit 1
          fi

      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: dist/
          retention-days: 7

      - name: Post build status
        uses: actions/github-script@v7
        id: build-comment
        with:
          script: |
            const { exec } = require('@actions/exec');

            // Get build output
            let buildOutput = '';
            await exec('npm run build', [], {
              listeners: {
                stdout: (data) => {
                  buildOutput += data.toString();
                },
                stderr: (data) => {
                  buildOutput += data.toString();
                }
              }
            });

            // Create comment body
            const commentBody = `
            ## Build Validation
            
            ### Build Output
            \`\`\`
            ${buildOutput}
            \`\`\`
            
            ### Endpoint Validation
            Endpoints checked successfully.
            
            ### Deployment Preview Artifacts
            Deployment preview artifacts have been uploaded.
            `;

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
